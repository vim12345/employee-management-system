version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ems-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: ems-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/ems
      JWT_SECRET: ${JWT_SECRET:-change_this_super_secret_key}
      JWT_EXPIRES_IN: 1d
      CLIENT_URL: http://localhost:8080
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL:-admin@ems.com}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:-Admin@123}
    ports:
      - '5000:5000'

  frontend:
    build: ./frontend
    container_name: ems-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo_data:
